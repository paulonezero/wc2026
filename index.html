<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 SS · World Cup Sweepstake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesque:wght@400..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sweepstake/styles.css">
<style>
  /* layout grids (responsive) */
  .sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
  .pile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .podium{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:end;max-width:620px;margin:0 auto 26px}
  .stage-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1.5px,transparent 1.6px);background-size:18px 18px;z-index:1}
  @media(max-width:820px){
    .lobby-grid{grid-template-columns:1fr !important}
    .odds-grid{grid-template-columns:1fr !important}
    .admin-grid{grid-template-columns:1fr !important}
    .today-grid{grid-template-columns:1fr !important}
    .sticker-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .matchrow{grid-template-columns:1fr 64px 1fr}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="sweepstake/data.js"></script>
<script src="sweepstake/store.js"></script>
<script src="sweepstake/net.js"></script>
<script type="text/babel" src="sweepstake/ui.jsx"></script>
<script type="text/babel" src="sweepstake/screens1.jsx"></script>
<script type="text/babel" src="sweepstake/screens2.jsx"></script>
<script type="text/babel" src="sweepstake/app.jsx"></script>
</body>
</html>
