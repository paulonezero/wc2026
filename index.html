<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 SS · World Cup Sweepstake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Hanken+Grotesque:wght@400..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sweepstake/styles.css">
<style>
  /* layout grids (responsive) */
  .sticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
  .pile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .podium{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:end;max-width:620px;margin:0 auto 26px}
  .stage-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1.5px,transparent 1.6px);background-size:18px 18px;z-index:1}
  @media(max-width:820px){
    .lobby-grid{grid-template-columns:1fr !important}
    .odds-grid{grid-template-columns:1fr !important}
    .admin-grid{grid-template-columns:1fr !important}
    .today-grid{grid-template-columns:1fr !important}
    .sticker-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .matchrow{grid-template-columns:1fr 64px 1fr}
  }
  @media(max-width:520px){
    /* shell + topbar */
    .app{padding:0 14px 100px}
    .topbar{padding:14px 0 12px;gap:10px}
    .brand{gap:9px}
    .brand .mark{width:34px;height:34px;border-radius:9px}
    .brand .bt{font-size:16px}
    .brand .bt small{display:none}
    .potchip{padding:6px 10px;gap:6px}
    .potchip .pl{font-size:9px;letter-spacing:.12em}
    .potchip .pv{font-size:16px}
    .hostbtn{padding:7px 9px;font-size:11px;gap:5px;margin-left:6px}

    /* tabs: shrink padding+font so 4-5 tabs fit one row */
    .tabs{margin-bottom:20px;gap:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .tab{padding:11px 9px;font-size:12px;letter-spacing:.04em}
    .tab.on::after{left:9px;right:9px}

    /* panels + cards */
    .panel{padding:16px}
    .sectlabel{margin:4px 0 12px;font-size:10px;letter-spacing:.16em}

    /* match rows */
    .matchrow{grid-template-columns:1fr 56px 1fr;gap:8px;padding:11px 8px}
    .scorebox{font-size:20px}
    .score-in{width:38px;font-size:15px;padding:7px 2px}

    /* signup steps */
    .steps{grid-template-columns:repeat(2,1fr);gap:10px;margin:22px 0 14px}
    .step{padding:14px 10px}

    /* podium: narrower cells + ellipsis name + lower blocks */
    .podium{max-width:100%;gap:10px;margin:0 auto 20px}
    .podium-name{font-size:14px}

    /* tile grids */
    .sticker-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
    .pile-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}

    /* confederation filter row in Teams */
    .confed-row{gap:5px;margin:12px 0 18px}
    .confed-row > button{padding:6px 10px;font-size:11px}

    /* team-win odds row: hide bar, let name fill space */
    .odds-name{width:auto;flex:1;min-width:0;font-size:13px}
    .odds-bar{display:none}
    .odds-row{gap:9px;padding:8px 10px}

    /* admin pool-settings grid: pool-name full width, pot+cur side-by-side below */
    .pool-grid{grid-template-columns:1fr 1fr;gap:10px}
    .pool-grid > div:first-child{grid-column:1 / -1}

    /* hero card on signup */
    .hero{padding:28px 22px 26px}

    /* Teams: search + view-toggle stack with input full width */
    .search-row{flex-wrap:wrap}
    .search-row > input.field{flex:1 1 100% !important;width:auto !important}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="sweepstake/data.js"></script>
<script src="sweepstake/store.js"></script>
<script src="sweepstake/net.js"></script>
<script type="text/babel" src="sweepstake/ui.jsx"></script>
<script type="text/babel" src="sweepstake/screens1.jsx"></script>
<script type="text/babel" src="sweepstake/screens2.jsx"></script>
<script type="text/babel" src="sweepstake/app.jsx"></script>
</body>
</html>
